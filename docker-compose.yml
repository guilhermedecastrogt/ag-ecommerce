services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ag-ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ag-ecommerce-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mysql:
    image: mysql:8.4
    container_name: ag-ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: study_ms
    ports:
      - '3309:3306'
    healthcheck:
      test: [ 'CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot' ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  # ─── Microservices ───────────────────────────────────────────────────────────

  users-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-users-service
    environment:
      PORT: 4001
      HEALTH_PORT: 4011
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    # db:push here creates all tables (shared schema)
    command: sh -c "npm run prisma:generate && npx prisma db push --accept-data-loss && npm run start:users"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4001:4001'
      - '4011:4011'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4011/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  orders-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-orders-service
    environment:
      PORT: 4002
      HEALTH_PORT: 4012
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    command: sh -c "npm run prisma:generate && npm run start:orders"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4002:4002'
      - '4012:4012'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4012/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-auth-service
    environment:
      PORT: 4003
      HEALTH_PORT: 4013
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    command: sh -c "npm run prisma:generate && npm run start:auth"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4003:4003'
      - '4013:4013'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4013/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-product-service
    environment:
      PORT: 4004
      HEALTH_PORT: 4014
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    command: sh -c "npm run prisma:generate && npm run start:product"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4004:4004'
      - '4014:4014'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4014/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  shipping-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-shipping-service
    environment:
      PORT: 4005
      HEALTH_PORT: 4015
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
      MELHOR_ENVIO_API_URL: https://sandbox.melhorenvio.com.br
      MELHOR_ENVIO_CLIENT_ID: ${MELHOR_ENVIO_CLIENT_ID:-id}
      MELHOR_ENVIO_CLIENT_SECRET: ${MELHOR_ENVIO_CLIENT_SECRET:-secret}
      MELHOR_ENVIO_REDIRECT_URI: http://localhost:3010/shipping/auth/callback
      MELHOR_ENVIO_USER_AGENT: ag-ecommerce (suporte@ecommerce.com)
    command: sh -c "npm run prisma:generate && npm run start:shipping"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4005:4005'
      - '4015:4015'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4015/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-payment-service
    environment:
      PORT: 4006
      HEALTH_PORT: 4016
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
      PAYMENT_SUCCESS_URL: ${PAYMENT_SUCCESS_URL:-http://localhost:3000/pedido/confirmacao}
      PAYMENT_CANCEL_URL: ${PAYMENT_CANCEL_URL:-http://localhost:3000/carrinho}
      PAGARME_API_KEY: ${PAGARME_API_KEY:-}
      PAGARME_API_URL: ${PAGARME_API_URL:-https://api.pagar.me/core/v5}
      PAGARME_WEBHOOK_SECRET: ${PAGARME_WEBHOOK_SECRET:-}
      PAGBANK_API_KEY: ${PAGBANK_API_KEY:-}
      PAGBANK_API_URL: ${PAGBANK_API_URL:-https://sandbox.api.pagseguro.com}
      PAGBANK_WEBHOOK_URL: ${PAGBANK_WEBHOOK_URL:-}
    command: sh -c "npm run prisma:generate && npm run start:payment"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '4006:4006'
      - '4016:4016'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:4016/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-api-gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3001}
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 4001
      ORDERS_SERVICE_HOST: orders-service
      ORDERS_SERVICE_PORT: 4002
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 4003
      PRODUCTS_SERVICE_HOST: product-service
      PRODUCTS_SERVICE_PORT: 4004
      SHIPPING_SERVICE_HOST: shipping-service
      SHIPPING_SERVICE_PORT: 4005
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 4006
      KAFKA_BROKER: kafka:9092
      PAGARME_WEBHOOK_SECRET: ${PAGARME_WEBHOOK_SECRET:-}
      PAGBANK_API_KEY: ${PAGBANK_API_KEY:-}
    command: sh -c "npm run prisma:generate && npm run start:gateway"
    depends_on:
      users-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      shipping-service:
        condition: service_started
      payment-service:
        condition: service_healthy
    ports:
      - '3010:3000'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Seed — cria usuário admin automaticamente ────────────────────────────────

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ag-ecommerce-seed
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aguiadiesel.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    command: sh -c "npm run prisma:generate && node scripts/seed-admin.mjs"
    depends_on:
      auth-service:
        condition: service_healthy
    restart: on-failure

  # ─── Frontends ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3010
    container_name: ag-ecommerce-frontend
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      NODE_ENV: production

  frontend-admin:
    build:
      context: ./apps/frontend-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3010
    container_name: ag-ecommerce-admin
    ports:
      - '3001:3001'
    depends_on:
      api-gateway:
        condition: service_started
      seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production

volumes:
  mysql_data:
