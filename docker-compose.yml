services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ms-study-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ms-study-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      zookeeper:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: ms-study-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: study_ms
    ports:
      - '3308:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  # ─── Microservices ───────────────────────────────────────────────────────────

  users-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-users-service
    environment:
      PORT: 4001
      HEALTH_PORT: 4011
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    # db:push here creates all tables (shared schema)
    command: sh -c "npm run prisma:generate && npm run db:push && npm run start:users"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '4001:4001'
      - '4011:4011'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:4011/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  orders-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-orders-service
    environment:
      PORT: 4002
      HEALTH_PORT: 4012
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    command: sh -c "npm run prisma:generate && npm run start:orders"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '4002:4002'
      - '4012:4012'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:4012/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-auth-service
    environment:
      PORT: 4003
      HEALTH_PORT: 4013
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 4001
    command: sh -c "npm run prisma:generate && npm run start:auth"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '4003:4003'
      - '4013:4013'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:4013/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-product-service
    environment:
      PORT: 4004
      HEALTH_PORT: 4014
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
    command: sh -c "npm run prisma:generate && npm run start:product"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '4004:4004'
      - '4014:4014'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:4014/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  shipping-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-shipping-service
    environment:
      PORT: 4005
      HEALTH_PORT: 4015
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      KAFKA_BROKER: kafka:9092
      MELHOR_ENVIO_API_URL: https://sandbox.melhorenvio.com.br
      MELHOR_ENVIO_CLIENT_ID: ${MELHOR_ENVIO_CLIENT_ID:-id}
      MELHOR_ENVIO_CLIENT_SECRET: ${MELHOR_ENVIO_CLIENT_SECRET:-secret}
      MELHOR_ENVIO_REDIRECT_URI: http://localhost:3010/shipping/auth/callback
      MELHOR_ENVIO_USER_AGENT: ag-ecommerce (suporte@ecommerce.com)
      # Serviço de frete padrão: 1=PAC, 2=SEDEX (Correios sandbox)
      MELHOR_ENVIO_SERVICE_ID: ${MELHOR_ENVIO_SERVICE_ID:-1}
      # Dados do remetente (empresa)
      MELHOR_ENVIO_SENDER_NAME: ${MELHOR_ENVIO_SENDER_NAME:-Águia Diesel}
      MELHOR_ENVIO_SENDER_PHONE: ${MELHOR_ENVIO_SENDER_PHONE:-62999999999}
      MELHOR_ENVIO_SENDER_EMAIL: ${MELHOR_ENVIO_SENDER_EMAIL:-suporte@aguiadiesel.com.br}
      MELHOR_ENVIO_SENDER_DOCUMENT: ${MELHOR_ENVIO_SENDER_DOCUMENT:-00000000000000}
      MELHOR_ENVIO_SENDER_ADDRESS: ${MELHOR_ENVIO_SENDER_ADDRESS:-Rua Exemplo}
      MELHOR_ENVIO_SENDER_NUMBER: ${MELHOR_ENVIO_SENDER_NUMBER:-1}
      MELHOR_ENVIO_SENDER_DISTRICT: ${MELHOR_ENVIO_SENDER_DISTRICT:-Centro}
      MELHOR_ENVIO_SENDER_CITY: ${MELHOR_ENVIO_SENDER_CITY:-Goiânia}
      MELHOR_ENVIO_SENDER_STATE: ${MELHOR_ENVIO_SENDER_STATE:-GO}
      MELHOR_ENVIO_SENDER_POSTAL_CODE: ${MELHOR_ENVIO_SENDER_POSTAL_CODE:-74000000}
      # Dimensões padrão da caixa (cm) e peso padrão por unidade (kg)
      MELHOR_ENVIO_DEFAULT_HEIGHT: ${MELHOR_ENVIO_DEFAULT_HEIGHT:-10}
      MELHOR_ENVIO_DEFAULT_WIDTH: ${MELHOR_ENVIO_DEFAULT_WIDTH:-15}
      MELHOR_ENVIO_DEFAULT_LENGTH: ${MELHOR_ENVIO_DEFAULT_LENGTH:-20}
      MELHOR_ENVIO_DEFAULT_WEIGHT: ${MELHOR_ENVIO_DEFAULT_WEIGHT:-0.3}
    command: sh -c "npm run prisma:generate && npm run start:shipping"
    depends_on:
      users-service:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '4005:4005'
      - '4015:4015'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:4015/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-api-gateway
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      # comma-separated: allow both frontend (3000) and admin (3001)
      FRONTEND_URL: "http://localhost:3000,http://localhost:3001"
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 4001
      ORDERS_SERVICE_HOST: orders-service
      ORDERS_SERVICE_PORT: 4002
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 4003
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 4004
      SHIPPING_SERVICE_HOST: shipping-service
      SHIPPING_SERVICE_PORT: 4005
    command: npm run start:gateway
    depends_on:
      users-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      shipping-service:
        condition: service_started
    ports:
      - '3010:3000'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Seed — cria usuário admin automaticamente ────────────────────────────────

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-study-seed
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/study_ms}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aguiadiesel.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    command: sh -c "npm run prisma:generate && node scripts/seed-admin.mjs"
    depends_on:
      auth-service:
        condition: service_healthy
    restart: on-failure

  # ─── Frontends ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3010
    container_name: ms-study-frontend
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: production

  frontend-admin:
    build:
      context: ./apps/frontend-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3010
    container_name: ms-study-frontend-admin
    ports:
      - '3001:3001'
    depends_on:
      api-gateway:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production

volumes:
  mysql_data:
